<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta http-equiv="Content-Security-Policy" content="default-src 'unsafe-inline' 'unsafe-eval' data: blob:; connect-src * https: http: wss:;">
<meta name="format-detection" content="telephone=no">
<meta name="x5-page-mode" content="app">
<meta name="browsermode" content="application">
<title>电商支付营销监控 · V6数据驱动版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0e1a;--card:#111827;--card2:#1a2332;--border:#1e2d3d;
--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
--accent:#3b82f6;--accent2:#8b5cf6;--accent3:#06b6d4;
--red:#ef4444;--orange:#f59e0b;--green:#22c55e;--pink:#ec4899;
--dy:#fe2c55;--tb:#ff6a00;--tm:#ff0036;--jd:#e23a3a;--pdd:#e02e24;
--xhs:#ff2442;--alipay:#1677ff;--wx:#07c160;--union:#e60012;--jdpay:#c62828;--baitiao:#1565c0;
}
.light{--bg:#f1f5f9;--card:#ffffff;--card2:#f8fafc;--border:#e2e8f0;--text:#1e293b;--text2:#475569;--text3:#94a3b8}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;line-height:1.6;transition:background .3s,color .3s;overflow-x:hidden;word-break:break-word}
a{color:var(--accent);text-decoration:none}
.container{max-width:1440px;margin:0 auto;padding:16px;position:relative;z-index:1}
.control-area{position:relative;z-index:100;pointer-events:auto;isolation:isolate}

.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:12px}
.header-left h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-left .badge{background:var(--red);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;animation:pulse 2s infinite}
.header-left .version{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:10px;padding:2px 6px;border-radius:6px;font-weight:600;margin-left:8px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.update-time{font-size:12px;color:var(--text3)}
.fav-count{font-size:12px;color:var(--orange);cursor:pointer;pointer-events:auto;position:relative;z-index:1}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s;pointer-events:auto;position:relative;z-index:1}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.ticker{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;margin-bottom:20px;overflow:hidden;position:relative}
.ticker-tag{position:absolute;left:0;top:0;bottom:0;background:var(--accent);color:#fff;font-size:11px;font-weight:700;padding:0 10px;display:flex;align-items:center;border-radius:10px 0 0 10px;z-index:2}
.ticker-content{margin-left:56px;white-space:nowrap;animation:scroll 30s linear infinite;font-size:13px;color:var(--text2)}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-200%)}}

.year-timeline{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;overflow:visible}
.yt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.yt-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.yt-year{font-size:12px;color:var(--text3);background:var(--card2);padding:2px 10px;border-radius:10px}
.yt-track-wrap{position:relative;height:100px;margin:0 24px;overflow:visible;user-select:none}
.yt-track{position:absolute;top:38px;left:0;right:0;height:4px;background:var(--border);border-radius:2px}
.yt-progress{position:absolute;top:38px;left:0;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));overflow:hidden}
.yt-progress::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);animation:ytShimmer 3s infinite}
@keyframes ytShimmer{0%{left:-100%}100%{left:100%}}
.yt-now{position:absolute;top:31px;width:18px;height:18px;border-radius:50%;background:var(--accent);border:3px solid var(--card);box-shadow:0 0 14px rgba(59,130,246,0.6);transform:translateX(-50%);z-index:4;animation:ytNowPulse 2s infinite}
@keyframes ytNowPulse{0%,100%{box-shadow:0 0 14px rgba(59,130,246,0.6)}50%{box-shadow:0 0 26px rgba(59,130,246,0.9)}}
.yt-node{position:absolute;top:24px;transform:translateX(-50%);z-index:3;cursor:pointer;text-align:center;transition:transform .2s}
.yt-node:hover{transform:translateX(-50%) scale(1.25);z-index:5}
.yt-node-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:11px;margin:0 auto;transition:all .3s}
.yt-node.yt-past .yt-node-dot{opacity:.45;border-color:var(--text3)}
.yt-node.yt-current .yt-node-dot{border-color:var(--red);background:rgba(239,68,68,.12);box-shadow:0 0 10px rgba(239,68,68,.3);animation:ytNodePulse 2s infinite}
.yt-node.yt-upcoming .yt-node-dot{border-color:var(--accent);background:rgba(59,130,246,.08)}
@keyframes ytNodePulse{0%,100%{box-shadow:0 0 8px rgba(239,68,68,.25)}50%{box-shadow:0 0 18px rgba(239,68,68,.5)}}
.yt-node-label{font-size:9px;color:var(--text3);margin-top:3px;white-space:nowrap;max-width:52px;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.yt-node.yt-current .yt-node-label{color:var(--red);font-weight:700;font-size:10px}
.yt-node-info{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;z-index:10;box-shadow:0 4px 14px rgba(0,0,0,.3)}
.yt-node:hover .yt-node-info{opacity:1}
.yt-node-info .info-name{font-weight:600;color:var(--text);margin-bottom:2px}
.yt-node-info .info-time{color:var(--text3);font-size:10px}
.yt-node-stagger-even{top:24px}
.yt-node-stagger-odd{top:8px}
.yt-node-stagger-odd .yt-node-info{bottom:auto;top:calc(100% + 6px)}
.yt-months{display:flex;justify-content:space-between;padding:0;margin-top:4px;font-size:9px;color:var(--text3)}
.yt-cd-row{display:flex;align-items:center;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.yt-cd-item{display:flex;align-items:center;gap:5px;font-size:12px}
.yt-cd-item .cd-val{font-weight:700;color:var(--accent)}
.yt-cd-item .cd-val.urgent{color:var(--red)}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;cursor:pointer;pointer-events:auto;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 0 0 60px;opacity:.1}
.stat-card:nth-child(1)::after{background:var(--accent)}.stat-card:nth-child(2)::after{background:var(--accent2)}.stat-card:nth-child(3)::after{background:var(--green)}.stat-card:nth-child(4)::after{background:var(--orange)}.stat-card:nth-child(5)::after{background:var(--pink)}
.stat-label{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.stat-value{font-size:26px;font-weight:700}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}
.sc-blue .stat-value{color:var(--accent)}.sc-purple .stat-value{color:var(--accent2)}.sc-green .stat-value{color:var(--green)}.sc-orange .stat-value{color:var(--orange)}.sc-pink .stat-value{color:var(--pink)}

.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;margin-bottom:16px;width:100%;max-width:400px}
.search-box input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;flex:1}
.search-box input::placeholder{color:var(--text3)}

.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar .label{font-size:13px;color:var(--text3);margin-right:4px;white-space:nowrap}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;pointer-events:auto;position:relative;z-index:1}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0;flex-wrap:wrap}
.tab-btn{padding:8px 16px;border:none;background:transparent;color:var(--text3);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;pointer-events:auto;position:relative;z-index:1;white-space:nowrap}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

.tab-content{display:none}
.tab-content.active{display:block}

.platform-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.platform-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s}
.platform-card:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.2)}
.pc-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.pc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.pc-name{font-size:15px;font-weight:600}
.pc-sub{font-size:11px;color:var(--text3)}
.pc-body{padding:12px 16px}
.offer-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);position:relative;padding-right:24px}
.offer-row:last-child{border-bottom:none}
.offer-bank{font-size:12px;font-weight:600;color:var(--accent2);min-width:70px;flex-shrink:0}
.offer-type{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.type-reduce{background:rgba(34,197,94,.15);color:var(--green)}
.type-installment{background:rgba(59,130,246,.15);color:var(--accent)}
.type-bind{background:rgba(245,158,11,.15);color:var(--orange)}
.type-random{background:rgba(139,92,246,.15);color:var(--accent2)}
.type-points{background:rgba(6,182,212,.15);color:var(--accent3)}
.type-cashback{background:rgba(236,72,153,.15);color:var(--pink)}
.type-subsidy{background:rgba(239,68,68,.15);color:var(--red)}
.type-exempt{background:rgba(34,197,94,.15);color:var(--green)}
.offer-detail{font-size:12px;color:var(--text2);line-height:1.5;flex:1}
.offer-amount{font-size:13px;font-weight:700;color:var(--green);white-space:nowrap;flex-shrink:0}
.offer-fav{position:absolute;right:4px;top:8px;cursor:pointer;font-size:14px;opacity:.4;transition:opacity .2s;pointer-events:auto}
.offer-fav:hover{opacity:1}.offer-fav.active{opacity:1}
.offer-status{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600;margin-left:4px}
.status-active{background:rgba(34,197,94,.15);color:var(--green)}
.status-expiring{background:rgba(245,158,11,.15);color:var(--orange)}
.status-expired{background:rgba(100,116,139,.15);color:var(--text3)}
.status-upcoming{background:rgba(59,130,246,.15);color:var(--accent)}

.bank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.bank-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.bank-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.bank-name{font-size:15px;font-weight:600}
.bank-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(59,130,246,.15);color:var(--accent)}
.bank-body{padding:12px 16px}
.bank-platform-group{padding:8px 0;border-bottom:1px solid var(--border)}
.bank-platform-group:last-child{border-bottom:none}
.bank-plat-name{font-size:12px;font-weight:600;margin-bottom:4px}
.bank-offer{font-size:12px;color:var(--text2);padding-left:14px;margin:2px 0}

.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.cat-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.cat-icon{font-size:22px}
.cat-name{font-size:15px;font-weight:600}
.cat-count{font-size:11px;color:var(--text3);margin-left:auto}
.cat-body{padding:12px 16px}
.cat-platform{padding:8px 0;border-bottom:1px solid var(--border)}
.cat-platform:last-child{border-bottom:none}
.cat-platform-name{font-size:12px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.cat-platform-name .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-offer{font-size:12px;color:var(--text2);padding-left:14px;margin:2px 0}

.compare-section{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow-x:auto;margin-bottom:16px}
.compare-table{width:100%;border-collapse:collapse;font-size:12px;min-width:800px}
.compare-table th{background:var(--card2);padding:10px 12px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0}
.compare-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
.compare-table tr:hover td{background:rgba(59,130,246,.05)}
.compare-table .highlight{color:var(--green);font-weight:600}
.compare-table .platform-col{font-weight:600;color:var(--text);white-space:nowrap}
.dot-dy{color:var(--dy)}.dot-tb{color:var(--tb)}.dot-tm{color:var(--tm)}.dot-jd{color:var(--jd)}.dot-pdd{color:var(--pdd)}.dot-xhs{color:var(--xhs)}

.calc-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.calc-section h3{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.calc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.calc-field{display:flex;flex-direction:column;gap:4px}
.calc-field label{font-size:12px;color:var(--text3)}
.calc-field input,.calc-field select{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;outline:none}
.calc-field input:focus,.calc-field select:focus{border-color:var(--accent)}
.calc-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;pointer-events:auto;transition:transform .2s}
.calc-btn:hover{transform:scale(1.02)}
.calc-result{margin-top:16px;display:none}
.calc-result.show{display:block}
.calc-best{background:rgba(34,197,94,.1);border:1px solid var(--green);border-radius:10px;padding:16px;margin-bottom:12px}
.calc-best h4{color:var(--green);font-size:14px;margin-bottom:8px}
.calc-best .combo{font-size:20px;font-weight:700;color:var(--green);margin-bottom:4px}
.calc-best .detail{font-size:12px;color:var(--text2)}
.calc-others{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
.calc-other{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px}
.calc-other .rank{font-size:11px;color:var(--accent);font-weight:600}
.calc-other .combo-text{font-size:13px;font-weight:600;margin:4px 0}
.calc-other .save{font-size:16px;font-weight:700;color:var(--green)}
.calc-other .detail{font-size:11px;color:var(--text3)}

.stack-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.stack-section h3{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.stack-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.stack-step{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;text-align:center;min-width:120px}
.stack-step .icon{font-size:24px;margin-bottom:4px}
.stack-step .name{font-size:12px;font-weight:600}
.stack-step .amount{font-size:14px;font-weight:700;color:var(--green)}
.stack-arrow{font-size:20px;color:var(--text3)}
.stack-result{background:rgba(34,197,94,.08);border:2px solid var(--green);border-radius:12px;padding:16px;text-align:center}
.stack-result .label{font-size:12px;color:var(--text3)}
.stack-result .price{font-size:28px;font-weight:700;color:var(--green)}
.stack-result .saved{font-size:14px;color:var(--accent2)}

.rank-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.rank-section h3{font-size:14px;font-weight:600;margin-bottom:12px}
.rank-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.rank-item:last-child{border-bottom:none}
.rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.rank-num.r1{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.rank-num.r2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff}
.rank-num.r3{background:linear-gradient(135deg,#b45309,#92400e);color:#fff}
.rank-num.r4{background:var(--card2);color:var(--text3)}
.rank-info{flex:1;min-width:0}
.rank-info .title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-info .desc{font-size:11px;color:var(--text3)}
.rank-save{font-size:16px;font-weight:700;color:var(--green);flex-shrink:0}
.rank-fav{cursor:pointer;font-size:18px;flex-shrink:0;pointer-events:auto;opacity:.6;transition:opacity .2s}
.rank-fav:hover{opacity:1}.rank-fav.active{opacity:1}

.chart-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:14px;margin-bottom:16px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:12px}
canvas{width:100%;max-height:260px}

.heatmap-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.heatmap-title{font-size:14px;font-weight:600;margin-bottom:12px}

.trend-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.trend-title{font-size:14px;font-weight:600;margin-bottom:12px}

.tips{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.tips h3{font-size:14px;font-weight:600;margin-bottom:8px;color:var(--orange)}
.tips ul{padding-left:18px;font-size:13px;color:var(--text2)}
.tips li{margin-bottom:4px}

.fav-panel{position:fixed;top:0;right:0;width:380px;height:100%;background:var(--card);border-left:1px solid var(--border);z-index:1000;padding:20px;overflow-y:auto;display:none}
.fav-panel.open{display:block}
.fav-panel h3{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.fav-panel .close{cursor:pointer;font-size:20px;pointer-events:auto}
.fav-item{padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;font-size:12px}
.fav-item .fav-title{font-weight:600;margin-bottom:4px}
.fav-item .fav-desc{color:var(--text3)}
.fav-item .fav-remove{color:var(--red);cursor:pointer;font-size:11px;pointer-events:auto;margin-top:4px;display:inline-block}
.fav-export{display:flex;gap:8px;margin-top:16px}
.fav-export button{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:12px;cursor:pointer;pointer-events:auto;transition:all .2s}
.fav-export button:hover{border-color:var(--accent);color:var(--accent)}
.fav-empty{text-align:center;color:var(--text3);padding:40px 0;font-size:13px}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;display:none}
.overlay.show{display:block}

.scroll-top{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:18px;z-index:998;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.scroll-top.show{display:flex}

/* AI Chat Styles */
.ai-chat-section{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;max-height:500px;display:flex;flex-direction:column}
.ai-chat-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border)}
.ai-chat-title{font-size:15px;font-weight:600}
.ai-chat-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
.ai-chat-badge.offline{background:rgba(239,68,68,.12);color:var(--red)}
.ai-chat-badge.online{background:rgba(34,197,94,.12);color:var(--green)}
.ai-chat-badge.local{background:rgba(245,158,11,.12);color:var(--orange)}
.ai-chat-body{flex:1;overflow-y:auto;padding:16px 20px;min-height:200px;max-height:320px}
.ai-welcome{text-align:center;padding:16px 0}
.ai-welcome-icon{font-size:40px;margin-bottom:8px}
.ai-welcome-text{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6}
.ai-msg{margin-bottom:14px;animation:ragFadeIn .3s ease}
@keyframes ragFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ai-msg-user{display:flex;justify-content:flex-end}
.ai-msg-user .ai-bubble{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:14px 14px 4px 14px;max-width:80%;padding:10px 14px;font-size:13px;line-height:1.6}
.ai-msg-ai{display:flex;justify-content:flex-start;gap:8px}
.ai-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent3),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ai-body{max-width:85%}
.ai-bubble{background:var(--card2);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:12px 14px;font-size:13px;line-height:1.7;color:var(--text)}
.ai-bubble p{margin:0 0 8px 0}.ai-bubble p:last-child{margin-bottom:0}
.ai-bubble strong{color:var(--accent)}
.ai-bubble em{color:var(--accent3);font-style:normal;font-weight:600}
.ai-thinking{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:12px;color:var(--text3)}
.ai-thinking-dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:ragDot 1.4s infinite;margin:0 2px}
.ai-thinking-dots span:nth-child(2){animation-delay:.2s}
.ai-thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes ragDot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
.ai-quick-actions{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ai-qa-btn{font-size:11px;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--card2);color:var(--text2);cursor:pointer;pointer-events:auto;position:relative;z-index:2;transition:all .2s;white-space:nowrap}
.ai-qa-btn:hover{border-color:var(--accent3);color:var(--accent3)}
.ai-input-row{display:flex;align-items:center;gap:8px;position:relative;z-index:2}
.ai-input-row input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;min-width:0}
.ai-input-row input::placeholder{color:var(--text3)}
.ai-input-row input:focus{border-color:var(--accent3)}
.ai-send-btn{background:linear-gradient(135deg,var(--accent3),var(--accent2));color:#fff;border:none;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;pointer-events:auto;position:relative;z-index:2;white-space:nowrap;transition:opacity .2s}
.ai-send-btn:hover{opacity:.9}
.ai-send-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-retrieval-info{font-size:10px;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ai-retrieval-info span{background:var(--card);padding:1px 6px;border-radius:4px}
.ai-source-card{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 8px;border-radius:8px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.15);color:var(--accent);margin:2px 2px}
.ai-source-card .src-bank{font-weight:600}
.ai-source-card .src-save{color:var(--green);font-weight:600}
.ai-sources{margin-top:8px;border-top:1px dashed var(--border);padding-top:8px}
.ai-sources-title{font-size:11px;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:4px}

/* AI Tab Content */
.ai-top-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.ai-top-header{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.ai-top-sub{font-size:11px;color:var(--text3);font-weight:400;margin-left:8px}
.ai-top-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.ai-top-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;position:relative;transition:transform .2s,border-color .2s}
.ai-top-card:hover{transform:translateY(-2px);border-color:var(--accent3)}
.ai-top-card .ai-match{font-size:11px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent3),var(--accent2));padding:2px 8px;border-radius:8px;position:absolute;top:8px;right:8px}
.ai-top-card .ai-reason{font-size:10px;color:var(--accent3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.ai-top-card .ai-offer-bank{font-size:13px;font-weight:600;color:var(--accent2)}
.ai-top-card .ai-offer-type{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;margin-left:6px}
.ai-top-card .ai-offer-detail{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.4}
.ai-top-card .ai-offer-amount{font-size:15px;font-weight:700;color:var(--green);margin-top:4px}
.ai-fb-btn{font-size:14px;cursor:pointer;opacity:.4;transition:opacity .2s;pointer-events:auto;position:relative;z-index:2;background:none;border:none;padding:2px}
.ai-fb-btn:hover{opacity:1}.ai-fb-btn.active{opacity:1}
.ai-stack-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.ai-stack-header{font-size:15px;font-weight:600;margin-bottom:12px}
.ai-stack-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.ai-stack-name{font-size:13px;font-weight:600;margin-bottom:6px}
.ai-stack-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ai-stack-step{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;text-align:center}
.ai-stack-step .s-label{color:var(--text3);font-size:10px}
.ai-stack-step .s-value{font-weight:600;color:var(--green)}
.ai-stack-arrow{color:var(--text3);font-size:14px}
.ai-stack-result{font-size:18px;font-weight:700;color:var(--green);margin-top:8px;text-align:center}
.ai-stack-result .save-detail{font-size:12px;color:var(--text3);font-weight:400}
.ai-insight-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:16px}
.ai-insight-header{font-size:15px;font-weight:600;margin-bottom:12px}
.ai-insight-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text2);line-height:1.5}
.ai-insight-item:last-child{border-bottom:none}
.ai-insight-item .ii-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.ai-insight-item .ii-text strong{color:var(--text);font-weight:600}

/* Data Management Tab */
.data-mgmt-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.data-mgmt-section h3{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.data-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.data-stat-card{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.data-stat-label{font-size:12px;color:var(--text3);margin-bottom:4px}
.data-stat-value{font-size:22px;font-weight:700}
.data-stat-value.active-color{color:var(--green)}
.data-stat-value.expiring-color{color:var(--orange)}
.data-stat-value.expired-color{color:var(--text3)}
.data-freshness{font-size:12px;padding:8px 12px;border-radius:8px;margin-bottom:16px}
.data-freshness.fresh{background:rgba(34,197,94,.1);border:1px solid var(--green);color:var(--green)}
.data-freshness.stale{background:rgba(245,158,11,.1);border:1px solid var(--orange);color:var(--orange)}
.data-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.data-table-container{overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
.data-table th{background:var(--card2);padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);white-space:nowrap}
.data-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2)}
.data-table tr:hover td{background:rgba(59,130,246,.05)}
.status-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.status-badge.active{background:rgba(34,197,94,.15);color:var(--green)}
.status-badge.expiring{background:rgba(245,158,11,.15);color:var(--orange)}
.status-badge.expired{background:rgba(100,116,139,.15);color:var(--text3)}
.status-badge.upcoming{background:rgba(59,130,246,.15);color:var(--accent)}
.manual-status-select{background:var(--card2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;color:var(--text);font-size:11px;cursor:pointer}

/* Monitor Log Tab */
.monitor-log-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.monitor-log-section h3{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.log-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.log-item{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px;font-size:12px}
.log-item:last-child{border-bottom:none}
.log-time{font-size:11px;color:var(--text3);white-space:nowrap;min-width:60px}
.log-icon{font-size:14px;flex-shrink:0}
.log-content{flex:1}
.log-title{font-weight:600;color:var(--text)}
.log-desc{font-size:11px;color:var(--text3);margin-top:2px}
.log-type-expired{color:var(--red)}
.log-type-new{color:var(--green)}
.log-type-expiring{color:var(--orange)}
.log-type-info{color:var(--accent)}
.log-empty{text-align:center;color:var(--text3);padding:40px 0;font-size:13px}

@media print{.header-right,.filter-bar,.tabs,.scroll-top,.fav-panel,.overlay,.year-timeline,.calc-section,.stack-section{display:none!important}.platform-grid,.category-grid,.bank-grid{grid-template-columns:repeat(2,1fr)}body{background:#fff;color:#000}}
@media(max-width:1280px){.container{padding:14px;max-width:100%}.platform-grid,.category-grid,.bank-grid{grid-template-columns:1fr}.chart-row{grid-template-columns:1fr}.fav-panel.open{width:100%}.stats-row{grid-template-columns:repeat(3,1fr)}.compare-table{font-size:12px}.stack-flow{flex-wrap:wrap}}
@media(max-width:768px){.container{padding:10px}.header{padding:10px 0;gap:8px;flex-wrap:wrap}.header-left h1{font-size:17px}.header-right{width:100%;justify-content:flex-start}.stats-row{grid-template-columns:repeat(2,1fr);gap:8px}.platform-grid,.category-grid,.bank-grid{grid-template-columns:1fr}.filter-btn{padding:5px 10px;font-size:11px}.chart-row{grid-template-columns:1fr}.year-timeline{padding:12px 10px}.fav-panel.open{width:100%}.stack-flow{flex-direction:column}.stack-arrow{transform:rotate(90deg)}.compare-section{margin-left:-10px;margin-right:-10px;border-radius:0}.ticker{padding:8px 12px}.ticker-content{margin-left:50px;font-size:12px}.tabs{overflow-x:auto;flex-wrap:nowrap}.tab-btn{flex-shrink:0;font-size:12px;padding:6px 12px}.calc-grid{grid-template-columns:1fr}.ai-chat-body{max-height:260px}.ai-top-grid{grid-template-columns:1fr}}
@media(max-width:400px){.stats-row{grid-template-columns:1fr 1fr}.header-left h1{font-size:15px}.filter-btn{padding:4px 8px;font-size:10px}.tab-btn{font-size:11px;padding:5px 10px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div class="header-left"><h1>💳 电商支付营销监控</h1><span class="badge" id="eventBadge">常态监控</span><span class="version" id="versionTag">V6数据驱动</span></div>
<div class="header-right"><span class="update-time" id="updateTime">加载中...</span><span class="fav-count" onclick="toggleFavPanel()">⭐ 收藏(<span id="favCountNum">0</span>)</span><button class="btn" onclick="toggleTheme()" id="themeBtn">🌙 暗色</button><button class="btn" onclick="window.print()">🖨️ 打印</button></div>
</div>

<div class="ticker"><span class="ticker-tag" id="tickerTag">📡 动态</span><div class="ticker-content" id="tickerContent">加载中...</div></div>

<div class="year-timeline" id="yearTimeline"></div>

<div class="stats-row" id="statsRow"></div>

<div class="search-box"><span>🔍</span><input type="text" placeholder="搜索银行、平台、优惠类型...（支持同义词：招行=招商银行=CMB）" id="searchInput" oninput="handleSearch()"></div>

<div class="filter-bar">
<div class="filter-row" id="filterPlatform">
<span class="label">平台：</span>
</div>
<div class="filter-row" id="filterPayMethod">
<span class="label">支付：</span>
</div>
<div class="filter-row" id="filterType">
<span class="label">类型：</span>
</div>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="switchTab('platform',this)" type="button">📊 按平台</button>
<button class="tab-btn" onclick="switchTab('bank',this)" type="button">🏦 按银行</button>
<button class="tab-btn" onclick="switchTab('category',this)" type="button">🏷️ 按品类</button>
<button class="tab-btn" onclick="switchTab('compare',this)" type="button">⚖️ 横向对比</button>
<button class="tab-btn" onclick="switchTab('calc',this)" type="button">🧮 省钱计算</button>
<button class="tab-btn" onclick="switchTab('stack',this)" type="button">🔄 叠加模拟</button>
<button class="tab-btn" onclick="switchTab('rank',this)" type="button">🏆 优惠排行</button>
<button class="tab-btn" onclick="switchTab('ai',this)" type="button">🤖 AI助手</button>
<button class="tab-btn" onclick="switchTab('data',this)" type="button">📊 数据管理</button>
<button class="tab-btn" onclick="switchTab('log',this)" type="button">📡 监控日志</button>
</div>

<!-- Tab: Platform -->
<div class="tab-content active" id="tab-platform">
<div class="platform-grid" id="platformGrid"></div>
</div>

<!-- Tab: Bank -->
<div class="tab-content" id="tab-bank">
<div class="bank-grid" id="bankGrid"></div>
</div>

<!-- Tab: Category -->
<div class="tab-content" id="tab-category">
<div class="category-grid" id="categoryGrid"></div>
</div>

<!-- Tab: Compare -->
<div class="tab-content" id="tab-compare">
<div class="compare-section" id="compareTable"></div>
</div>

<!-- Tab: Calculator -->
<div class="tab-content" id="tab-calc">
<div class="calc-section">
<h3>🧮 省钱计算器 — 输入金额，推荐最优组合</h3>
<div class="calc-grid">
<div class="calc-field"><label>购买金额（元）</label><input type="number" id="calcAmount" placeholder="例如 5999" value="5999"></div>
<div class="calc-field"><label>购买品类</label><select id="calcCategory"><option value="3c">📱 3C数码</option><option value="appliance">🏠 大家电</option><option value="beauty">💄 美妆个护</option><option value="gold">💍 黄金珠宝</option><option value="daily">🛒 日用快消</option><option value="food">🍜 餐饮外卖</option><option value="travel">✈️ 出行旅游</option></select></div>
<div class="calc-field"><label>是否使用分期</label><select id="calcInstallment"><option value="no">不分期</option><option value="3">3期</option><option value="6">6期</option><option value="12">12期</option><option value="24">24期</option></select></div>
<div class="calc-field"><label>支付方式偏好</label><select id="calcPayMethod"><option value="all">不限</option><option value="alipay">支付宝</option><option value="wx">微信支付</option><option value="union">云闪付</option><option value="jdpay">京东支付</option><option value="baitiao">白条支付</option></select></div>
</div>
<button class="calc-btn" onclick="calcBest()">💡 计算最优方案</button>
<div class="calc-result" id="calcResult"><div class="calc-best" id="calcBest"></div><div class="calc-others" id="calcOthers"></div></div>
</div>
</div>

<!-- Tab: Stack -->
<div class="tab-content" id="tab-stack">
<div class="stack-section">
<h3>🔄 优惠叠加模拟器 — 原价→平台券→国补→银行优惠</h3>
<div class="calc-grid">
<div class="calc-field"><label>商品原价（元）</label><input type="number" id="stackPrice" placeholder="例如 6999" value="6999"></div>
<div class="calc-field"><label>品类</label><select id="stackCategory"><option value="3c">📱 3C数码（国补至高500）</option><option value="appliance">🏠 大家电（国补至高1500）</option><option value="other">📦 其他品类（无国补）</option></select></div>
<div class="calc-field"><label>银行优惠</label><select id="stackBank"><option value="icbc_jd_300">工行京东分期减300</option><option value="cgb_jd_500">广发京东分期减500</option><option value="spdb_jd_500">浦发京东分期减500</option><option value="ceg_jd_300">光大京东分期随机减至高300</option><option value="icbc_tb_28">工行淘宝满2888减28</option><option value="cmb_6180">招行抽锦鲤至高6180</option><option value="baitiao_6">白条6期免息(省息费)</option><option value="baitiao_24">白条24期免息(省息费)</option><option value="none">不使用银行优惠</option></select></div>
<div class="calc-field"><label>平台优惠</label><select id="stackPlatform"><option value="jd_plus_50">京东PLUS会员券50</option><option value="jd_200">京东满减券200</option><option value="tm_300">天猫满减300</option><option value="tb_200">淘宝满减200</option><option value="none">无平台优惠</option></select></div>
</div>
<button class="calc-btn" onclick="calcStack()">💰 计算叠加后到手价</button>
<div id="stackResult" style="margin-top:20px"></div>
</div>
</div>

<!-- Tab: Rank -->
<div class="tab-content" id="tab-rank">
<div class="rank-section"><h3>🏆 优惠力度排行榜 — 按实际省钱金额排序</h3>
<div id="rankList"></div></div>
</div>

<!-- Tab: AI -->
<div class="tab-content" id="tab-ai">
<div class="ai-chat-section">
<div class="ai-chat-header">
<span class="ai-chat-title">💬 AI 智能问答</span>
<span class="ai-chat-badge local" id="aiStatusBadge">本地检索</span>
</div>
<div class="ai-chat-body" id="aiChatBody">
<div class="ai-welcome">
<div class="ai-welcome-icon">🤖</div>
<div class="ai-welcome-text">我是支付优惠智能助手，基于语义检索为您推荐最优方案</div>
</div>
</div>
<div class="ai-chat-input-area" style="border-top:1px solid var(--border);padding:12px 20px">
<div class="ai-quick-actions">
<button class="ai-qa-btn" onclick="aiQuick('京东最划算的方案')" type="button">📱 京东最划算</button>

// ============ Calculate Offer Status ============
function calcOfferStatus(offer) {
var now = new Date();
var end = new Date(offer.endDate);
var start = new Date(offer.startDate);
if(now < start) return 'upcoming';
var diffDays = Math.ceil((end - now) / (1000 * 60 * 60 * 24));
if(diffDays < 0) return 'expired';
if(diffDays <= 3) return 'expiring';
return 'active';
}

function formatDate(dateStr) {
var d = new Date(dateStr);

async function loadData() {
try {
var resp = await fetch('./data-v6.json');
if(resp.ok) {
_v6Data = await resp.json();
console.log('数据加载成功，版本:', _v6Data.version);
} else {
console.warn('数据文件加载失败，使用内嵌数据');
_v6Data = getFallbackData();
}
} catch(e) {
console.warn('数据加载出错，使用内嵌数据:', e.message);
_v6Data = getFallbackData();
}

// Apply user overrides if exists
try {
var overrides = localStorage.getItem('pay-v6-data-override');
if(overrides) {
var overrideData = JSON.parse(overrides);
if(overrideData.offers) {
overrideData.offers.forEach(function(over) {
var idx = _v6Data.offers.findIndex(function(o){return o.id === over.id;});
if(idx >= 0) {
_v6Data.offers[idx] = Object.assign({}, _v6Data.offers[idx], over);
}
});
}
}
} catch(e) {}

_v6Offers = _v6Data.offers.map(function(o) {
return Object.assign({}, o, {calcStatus: calcOfferStatus(o)});
});
_v6Platforms = _v6Data.platforms || [];
_v6Banks = _v6Data.banks || [];
_v6Calendar = _v6Data.calendar || [];

// Save fetch time
try {
localStorage.setItem('pay-v6-last-fetch', new Date().toISOString());
} catch(e) {}

// Load favs
try {
var favs = localStorage.getItem('pay-favs');
if(favs) _v6Favs = JSON.parse(favs);
} catch(e) {}

// Init UI
initFilters();
renderAll();
}

function getFilteredOffers() {
return _v6Offers.filter(function(o) {
if(_currentFilters.platform !== 'all' && o.platformKey !== _currentFilters.platform) return false;
if(_currentFilters.payMethod !== 'all' && o.payMethod !== _currentFilters.payMethod) return false;
if(_currentFilters.type !== 'all' && o.type !== _currentFilters.type) return false;
if(_currentFilters.search) {
var q = _currentFilters.search.toLowerCase();
var normBank = normalizeBank(_currentFilters.search);
if(normBank && o.bank.indexOf(normBank) >= 0) return true;
if(o.bank.toLowerCase().indexOf(q) >= 0) return true;
if(o.platform.toLowerCase().indexOf(q) >= 0) return true;
if(o.platformKey && o.platformKey.toLowerCase().indexOf(q) >= 0) return true;
if(o.detail && o.detail.toLowerCase().indexOf(q) >= 0) return true;
if(o.typeLabel && o.typeLabel.toLowerCase().indexOf(q) >= 0) return true;
if(o.tags && o.tags.some(function(t){return t.toLowerCase().indexOf(q) >= 0;})) return true;
return false;
}
return true;
});
}

function renderTimeline() {
var el = document.getElementById('yearTimeline');
var now = new Date();
var year = now.getFullYear();
var startOfYear = new Date(year, 0, 1);
var endOfYear = new Date(year, 11, 31);
var yearProgress = (now - startOfYear) / (endOfYear - startOfYear) * 100;

var nodes = _v6Calendar.filter(function(c) {
var cStart = new Date(c.start);
return cStart.getFullYear() === year;
});

var html = '<div class="yt-header"><div class="yt-title">📅 ' + year + '年营销日历</div><span class="yt-year">今年</span></div>';
html += '<div class="yt-track-wrap">';
html += '<div class="yt-track"></div>';
html += '<div class="yt-progress" style="width:' + yearProgress + '%"></div>';
html += '<div class="yt-now" style="left:' + yearProgress + '%"></div>';

nodes.forEach(function(c, i) {
var cStart = new Date(c.start);
var cEnd = new Date(c.end);
var pos = (cStart - startOfYear) / (endOfYear - startOfYear) * 100;
var endPos = (cEnd - startOfYear) / (endOfYear - startOfYear) * 100;
var width = endPos - pos;
var status = now < cStart ? 'yt-upcoming' : (now > cEnd ? 'yt-past' : 'yt-current');
var stagger = i % 2 === 0 ? 'yt-node-stagger-even' : 'yt-node-stagger-odd';

html += '<div class="yt-node ' + status + ' ' + stagger + '" style="left:' + pos + '%">';
html += '<div class="yt-node-dot">' + c.icon + '</div>';
html += '<div class="yt-node-label">' + c.name + '</div>';
html += '<div class="yt-node-info"><div class="info-name">' + c.icon + ' ' + c.name + '</div><div class="info-time">' + c.start + ' ~ ' + c.end + '</div><div class="info-desc">' + c.desc + '</div></div>';
html += '</div>';
});

html += '</div>';
html += '<div class="yt-months">';
for(var m = 0; m < 12; m++) {
html += '<span>' + (m + 1) + '月</span>';
}
html += '</div>';

// Countdown to next event
var upcoming = nodes.filter(function(c){ return new Date(c.start) > now; });
var nextEvent = upcoming.length > 0 ? upcoming[0] : null;
if(nextEvent) {
var daysTo = Math.ceil((new Date(nextEvent.start) - now) / (1000*60*60*24));
html += '<div class="yt-cd-row"><span class="yt-cd-item"><span class="cd-ico">⏰</span><span class="cd-lbl">距</span><span class="cd-val">' + nextEvent.icon + ' ' + nextEvent.name + '</span></span><span class="yt-cd-item"><span class="cd-ico">📅</span><span class="cd-lbl">还有</span><span class="cd-val' + (daysTo <= 7 ? ' urgent' : '') + '">' + daysTo + '天</span></span></div>';
}

el.innerHTML = html;
}

function parseAmount(str) {
var m = String(str).match(/(\d+)/);

}

// ============ Calculator ============
function calcBest() {
var amount = parseInt(document.getElementById('calcAmount').value) || 0;
var category = document.getElementById('calcCategory').value;
var installment = document.getElementById('calcInstallment').value;
var payMethod = document.getElementById('calcPayMethod').value;

var filtered = getFilteredOffers().filter(function(o) {
if(payMethod !== 'all' && o.payMethod !== payMethod) return false;
return true;
});

// Group by platform
var byPlatform = {};
filtered.forEach(function(o) {
if(!byPlatform[o.platform]) byPlatform[o.platform] = [];
byPlatform[o.platform].push(o);
});

// Calculate best
var results = [];
Object.keys(byPlatform).forEach(function(plat) {
var offers = byPlatform[plat];
var bestSave = 0;
var bestOffer = null;
offers.forEach(function(o) {
var save = parseAmount(o.amount);
if(save > bestSave) {
bestSave = save;
bestOffer = o;
}
});
if(bestOffer) {
results.push({platform: plat, offer: bestOffer, save: bestSave, total: Math.max(0, amount - bestSave)});
}
});

results.sort(function(a, b){return b.save - a.save;});
var best = results[0];

var html = '';
if(best) {
html += '<h4>💰 最优方案</h4>';
html += '<div class="combo">' + best.platform + ' · ' + best.offer.bank + ' ' + best.offer.typeLabel + '</div>';
html += '<div class="detail">优惠：' + best.offer.detail + '<br>节省：' + best.save + '元 → 实付：' + best.total + '元</div>';
}

var others = '';
results.slice(1, 4).forEach(function(r, i) {
others += '<div class="calc-other"><div class="rank">方案' + (i+2) + '</div><div class="combo-text">' + r.platform + ' · ' + r.offer.bank + '</div><div class="save">' + r.save + '元</div><div class="detail">实付 ' + r.total + '元</div></div>';
});

document.getElementById('calcBest').innerHTML = html;
document.getElementById('calcOthers').innerHTML = others;
document.getElementById('calcResult').classList.add('show');
}

// ============ Stack Calculator ============
function calcStack() {
var price = parseInt(document.getElementById('stackPrice').value) || 0;
var category = document.getElementById('stackCategory').value;
var bankSel = document.getElementById('stackBank').value;
var platSel = document.getElementById('stackPlatform').value;

var platSave = 0;
if(platSel === 'jd_plus_50') platSave = 50;
else if(platSel === 'jd_200') platSave = 200;
else if(platSel === 'tm_300') platSave = 300;
else if(platSel === 'tb_200') platSave = 200;

var guobuPct = 0, guobuCap = 0;
if(category === '3c') {guobuPct = 0.15; guobuCap = 500;}
else if(category === 'appliance') {guobuPct = 0.15; guobuCap = 1500;}

var bankSave = 0;
if(bankSel === 'icbc_jd_300') bankSave = 300;
else if(bankSel === 'cgb_jd_500' || bankSel === 'spdb_jd_500') bankSave = 500;
else if(bankSel === 'ceg_jd_300') bankSave = 150;

var afterPlat = Math.max(0, price - platSave);
var guobu = guobuPct > 0 ? Math.min(afterPlat * guobuPct, guobuCap) : 0;
var afterGuobu = Math.max(0, afterPlat - guobu);
var finalPrice = Math.max(0, afterGuobu - bankSave);
var totalSaved = price - finalPrice;

var html = '<div class="stack-flow">';
html += '<div class="stack-step"><div class="icon">💰</div><div class="name">原价</div><div class="amount">¥' + price + '</div></div>';
if(platSave > 0) {
html += '<span class="stack-arrow">→</span>';
html += '<div class="stack-step"><div class="icon">🎫</div><div class="name">平台券</div><div class="amount">-¥' + platSave + '</div></div>';
}
if(guobu > 0) {
html += '<span class="stack-arrow">→</span>';
html += '<div class="stack-step"><div class="icon">🏛️</div><div class="name">国补15%</div><div class="amount">-¥' + Math.round(guobu) + '</div></div>';
}
if(bankSave > 0) {
html += '<span class="stack-arrow">→</span>';
html += '<div class="stack-step"><div class="icon">🏦</div><div class="name">银行优惠</div><div class="amount">-¥' + bankSave + '</div></div>';
}
html += '</div>';
html += '<div class="stack-result"><div class="label">叠加后到手价</div><div class="price">¥' + Math.round(finalPrice) + '</div><div class="saved">共节省 ¥' + Math.round(totalSaved) + ' (' + (totalSaved/price*100).toFixed(1) + '%)</div></div>';

document.getElementById('stackResult').innerHTML = html;
}

}, 500);

function aiProcessQuery(q) {
var filtered = getFilteredOffers();
var normBank = normalizeBank(q);
var normPlat = normalizePlatform(q);
var qLower = q.toLowerCase();

// Filter by query
var results = filtered.filter(function(o) {
if(normBank && o.bank.indexOf(normBank) >= 0) return true;
if(normPlat && (o.platformKey === normPlat || o.platform.indexOf(normPlat) >= 0)) return true;
if(q.indexOf(o.typeLabel) >= 0) return true;
if(q.indexOf('分期') >= 0 && (o.type === 'installment' || o.type === 'subsidy')) return true;
if(q.indexOf('返现') >= 0 && o.type === 'cashback') return true;
if(q.indexOf('立减') >= 0 && o.type === 'reduce') return true;
return false;
}).slice(0, 8);

// Generate response
var lines = [];
if(results.length === 0) {
lines.push('抱歉，没有找到与"' + q + '"相关的优惠。');
lines.push('请尝试：指定银行（如"招行"）或平台（如"京东"）或优惠类型（如"分期"）');
} else {
lines.push('根据"' + q + '"为您找到' + results.length + '条相关优惠：\n');
results.forEach(function(o, i) {
lines.push('**' + (i+1) + '. ' + o.bank + ' · ' + o.platform + ' · ' + o.typeLabel + '**');
lines.push('   ' + o.detail);
if(o.amount) lines.push('   💰 ' + o.amount);
});
var best = results[0];
lines.push('\n**💡 最推荐：** ' + best.bank + ' ' + best.platform + ' ' + best.typeLabel + '，' + best.detail + '，最高' + best.amount);
}
return lines.join('\n');
}

function manualStatus(id, status) {
if(!status) return;
try {
var overrides = JSON.parse(localStorage.getItem('pay-v6-data-override') || '{"offers":[]}');
if(!overrides.offers) overrides.offers = [];
var idx = overrides.offers.findIndex(function(o){return o.id === id;});
if(idx >= 0) {
overrides.offers[idx].status = status;
} else {
overrides.offers.push({id: id, status: status});
}
localStorage.setItem('pay-v6-data-override', JSON.stringify(overrides));
alert('已标记 ' + id + ' 为 ' + status);
location.reload();
} catch(e) {
alert('保存失败: ' + e.message);
}
}

function importData(input) {

}
};

}

function generateMonitorLogs() {
var logs = [];
var now = new Date();

// Active offers
var active = _v6Offers.filter(function(o){return o.calcStatus === 'active';});
logs.push({
time: now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'}),
icon: '✅',
type: 'active',
title: '当前 ' + active.length + ' 项优惠正在进行中',
desc: '覆盖 ' + new Set(active.map(function(o){return o.platform;})).size + ' 个平台'
});

// Expiring offers
var expiring = _v6Offers.filter(function(o){return o.calcStatus === 'expiring';});
expiring.forEach(function(o) {
var end = new Date(o.endDate);
var daysLeft = Math.ceil((end - now) / (1000*60*60*24));
logs.push({
time: end.toLocaleDateString('zh-CN', {month:'short', day:'numeric'}),
icon: '⏰',
type: 'expiring',
title: o.bank + ' · ' + o.platform + ' ' + o.typeLabel + ' 即将到期',
desc: '剩余 ' + daysLeft + ' 天 (' + o.endDate + ')'
});
});

// Expired offers (last 5)
var expired = _v6Offers.filter(function(o){return o.calcStatus === 'expired';});
expired.slice(0, 5).forEach(function(o) {
logs.push({
time: o.endDate,
icon: '❌',
type: 'expired',
title: o.bank + ' · ' + o.platform + ' ' + o.typeLabel + ' 已到期',
desc: '已结束 (有效期至 ' + o.endDate + ')'
});
});

// Summary stats
logs.push({
time: now.toLocaleDateString('zh-CN'),
icon: '📊',
type: 'info',
title: '数据统计：' + _v6Offers.length + ' 条优惠 | ' + _v6Platforms.length + ' 个平台 | ' + _v6Banks.length + ' 家银行',
desc: '数据版本: ' + _v6Data.version + ' | 更新于: ' + _v6Data.lastUpdated
});

return logs;
}
