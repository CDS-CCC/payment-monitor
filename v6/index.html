<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta http-equiv="Content-Security-Policy" content="default-src 'unsafe-inline' 'unsafe-eval' data: blob:;">
<meta name="format-detection" content="telephone=no">
<meta name="x5-page-mode" content="app">
<meta name="browsermode" content="application">
<title>电商支付营销监控 V6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2332;--border:#1e2d3d;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#3b82f6;--accent2:#8b5cf6;--accent3:#06b6d4;--red:#ef4444;--orange:#f59e0b;--green:#22c55e;--pink:#ec4899;--dy:#fe2c55;--tb:#ff6a00;--tm:#ff0036;--jd:#e23a3a;--pdd:#e02e24;--xhs:#ff2442;--alipay:#1677ff;--wx:#07c160;--union:#e60012;--jdpay:#c62828;--baitiao:#1565c0}
.light{--bg:#f1f5f9;--card:#ffffff;--card2:#f8fafc;--border:#e2e8f0;--text:#1e293b;--text2:#475569;--text3:#94a3b8}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;line-height:1.6;transition:background .3s,color .3s;overflow-x:hidden;word-break:break-word}
a{color:var(--accent);text-decoration:none}
.container{max-width:1440px;margin:0 auto;padding:12px 16px}
.control-area{position:relative;z-index:100;pointer-events:auto;isolation:isolate}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap;gap:10px}
.header-left{display:flex;align-items:center;gap:10px}
.header-left h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-left .version{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:10px;padding:2px 6px;border-radius:6px;font-weight:600}
.header-right{display:flex;align-items:center;gap:8px}
.update-time{font-size:11px;color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s;pointer-events:auto;position:relative;z-index:1}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-icon{padding:6px 10px;font-size:14px}
.search-box{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;width:100%;max-width:360px}
.search-box input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;flex:1}
.search-box input::placeholder{color:var(--text3)}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.quick-btn{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s;pointer-events:auto}
.quick-btn:hover{border-color:var(--accent);color:var(--accent)}
.tabs{display:flex;gap:2px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:0;flex-wrap:wrap}
.tab-btn{padding:8px 14px;border:none;background:transparent;color:var(--text3);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;pointer-events:auto;position:relative;z-index:1;white-space:nowrap}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.filter-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.filter-row:last-child{margin-bottom:0}
.filter-row .label{font-size:12px;color:var(--text3);margin-right:2px;white-space:nowrap;min-width:52px}
.filter-btn{padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:var(--card2);color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s;pointer-events:auto;position:relative;z-index:1}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;pointer-events:auto;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.stat-value{font-size:22px;font-weight:700}
.stat-sub{font-size:10px;color:var(--text3);margin-top:2px}
.sc-blue .stat-value{color:var(--accent)}.sc-green .stat-value{color:var(--green)}.sc-orange .stat-value{color:var(--orange)}.sc-red .stat-value{color:var(--red)}
.calendar-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;overflow-x:auto}
.calendar-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.calendar-track{position:relative;height:80px;min-width:900px;margin:0 12px}
.calendar-line{position:absolute;top:30px;left:0;right:0;height:3px;background:var(--border);border-radius:2px}
.calendar-progress{position:absolute;top:30px;left:0;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.calendar-now{position:absolute;top:26px;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--card);transform:translateX(-50%);z-index:2}
.calendar-node{position:absolute;top:18px;transform:translateX(-50%);cursor:pointer;z-index:3;text-align:center;transition:transform .2s}
.calendar-node:hover{transform:translateX(-50%) scale(1.2)}
.calendar-node-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:10px;margin:0 auto;transition:all .2s}
.calendar-node.current .calendar-node-dot{border-color:var(--red);background:rgba(239,68,68,.12);box-shadow:0 0 8px rgba(239,68,68,.3)}
.calendar-node.past .calendar-node-dot{opacity:.5}
.calendar-node.upcoming .calendar-node-dot{border-color:var(--accent)}
.calendar-node-label{font-size:9px;color:var(--text3);margin-top:2px;white-space:nowrap;max-width:50px;overflow:hidden;text-overflow:ellipsis}
.calendar-node.current .calendar-node-label{color:var(--red);font-weight:600}
.calendar-node.upcoming .calendar-node-label{color:var(--accent)}
.calendar-node-info{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;z-index:10}
.calendar-node:hover .calendar-node-info{opacity:1}
.calendar-months{display:flex;justify-content:space-between;padding:4px 0 0;min-width:900px;font-size:9px;color:var(--text3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.15)}
.card-header{padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.card-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.card-name{font-size:14px;font-weight:600}
.card-sub{font-size:10px;color:var(--text3)}
.card-body{padding:10px 14px}
.offer-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);position:relative}
.offer-item:last-child{border-bottom:none}
.offer-bank{font-size:11px;font-weight:600;color:var(--accent2);min-width:60px;flex-shrink:0}
.offer-type{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;flex-shrink:0;white-space:nowrap}
.type-reduce{background:rgba(34,197,94,.15);color:var(--green)}
.type-installment,.type-free{background:rgba(59,130,246,.15);color:var(--accent)}
.type-bind{background:rgba(245,158,11,.15);color:var(--orange)}
.type-random{background:rgba(139,92,246,.15);color:var(--accent2)}
.type-points{background:rgba(6,182,212,.15);color:var(--accent3)}
.type-cashback,.type-freered{background:rgba(236,72,153,.15);color:var(--pink)}
.type-subsidy,.type-credit{background:rgba(239,68,68,.15);color:var(--red)}
.offer-detail{font-size:12px;color:var(--text2);line-height:1.4;flex:1}
.offer-amount{font-size:13px;font-weight:700;color:var(--green);white-space:nowrap;flex-shrink:0}
.offer-fav{position:absolute;right:0;top:8px;cursor:pointer;font-size:13px;opacity:.4;transition:opacity .2s;pointer-events:auto}
.offer-fav:hover{opacity:1}
.offer-fav.active{opacity:1;color:var(--orange)}
.status-badge{font-size:9px;padding:1px 4px;border-radius:3px;margin-left:4px}
.status-active{background:rgba(34,197,94,.15);color:var(--green)}
.status-expiring{background:rgba(245,158,11,.15);color:var(--orange)}
.status-expired{background:rgba(239,68,68,.15);color:var(--red)}
.compare-table{width:100%;border-collapse:collapse;font-size:12px;overflow-x:auto;display:block}
.compare-table th,.compare-table td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.compare-table th{background:var(--card2);font-weight:600;color:var(--text2);position:sticky;top:0}
.compare-table tr:hover td{background:rgba(59,130,246,.05)}
.compare-table .highlight{color:var(--green);font-weight:600}
.compare-table .best{background:rgba(34,197,94,.1)}
.calc-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.calc-section h3{font-size:15px;font-weight:600;margin-bottom:14px}
.calc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px}
.calc-field{display:flex;flex-direction:column;gap:4px}
.calc-field label{font-size:12px;color:var(--text3)}
.calc-field input,.calc-field select{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:14px;outline:none;width:100%}
.calc-field input:focus,.calc-field select:focus{border-color:var(--accent)}
.calc-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;pointer-events:auto;transition:transform .2s}
.calc-btn:hover{transform:scale(1.02)}
.calc-result{margin-top:14px}
.calc-best{background:rgba(34,197,94,.1);border:1px solid var(--green);border-radius:10px;padding:14px;margin-bottom:12px}
.calc-best h4{color:var(--green);font-size:13px;margin-bottom:6px}
.calc-best .combo{font-size:18px;font-weight:700;color:var(--green)}
.calc-others{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}
.calc-other{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:12px}
.calc-other .rank{font-size:11px;color:var(--accent)}
.calc-other .combo-text{font-size:13px;font-weight:600;margin:4px 0}
.calc-other .save{font-size:16px;font-weight:700;color:var(--green)}
.stack-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.stack-step{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;min-width:100px}
.stack-step .icon{font-size:20px;margin-bottom:2px}
.stack-step .name{font-size:11px;font-weight:600}
.stack-step .amount{font-size:14px;font-weight:700;color:var(--green)}
.stack-arrow{font-size:16px;color:var(--text3)}
.stack-result{background:rgba(34,197,94,.08);border:2px solid var(--green);border-radius:12px;padding:14px;text-align:center}
.stack-result .label{font-size:12px;color:var(--text3)}
.stack-result .price{font-size:24px;font-weight:700;color:var(--green)}
.stack-result .saved{font-size:13px;color:var(--accent2)}
.data-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.data-panel h3{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.data-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.data-stat{background:var(--card2);border-radius:8px;padding:10px 12px;text-align:center}
.data-stat .value{font-size:20px;font-weight:700}
.data-stat .label{font-size:11px;color:var(--text3)}
.data-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.data-actions .btn{flex:1;min-width:100px;text-align:center}
.data-warning{background:rgba(245,158,11,.1);border:1px solid var(--orange);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--orange);margin-bottom:14px}
.log-section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;max-height:400px;overflow-y:auto}
.log-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-icon{font-size:14px;flex-shrink:0;width:24px;text-align:center}
.log-content{flex:1}
.log-title{font-size:13px;font-weight:600}
.log-desc{font-size:11px;color:var(--text2)}
.log-time{font-size:10px;color:var(--text3);margin-top:2px}
.log-empty{text-align:center;color:var(--text3);padding:30px 0;font-size:13px}
.empty-state{text-align:center;color:var(--text3);padding:40px 20px;font-size:13px}
.cat-tag{font-size:9px;padding:1px 4px;border-radius:3px;background:var(--card2);color:var(--text3);margin-right:4px}
.search-highlight{background:rgba(245,158,11,.3);padding:0 2px;border-radius:2px}
.fav-panel{position:fixed;top:0;right:0;width:360px;height:100%;background:var(--card);border-left:1px solid var(--border);z-index:1001;padding:16px;overflow-y:auto;display:none}
.fav-panel.open{display:block}
.fav-panel h3{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.fav-panel .close{cursor:pointer;font-size:18px;pointer-events:auto}
.fav-item{padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;font-size:12px}
.fav-item .fav-title{font-weight:600;margin-bottom:2px}
.fav-item .fav-desc{color:var(--text3);font-size:11px}
.fav-item .fav-remove{color:var(--red);cursor:pointer;font-size:11px;pointer-events:auto;margin-top:4px;display:inline-block}
.fav-empty{text-align:center;color:var(--text3);padding:30px 0}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;display:none}
.overlay.show{display:block}
.scroll-top{position:fixed;bottom:20px;right:20px;width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:16px;z-index:998;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.scroll-top.show{display:flex}
.hidden{display:none!important}
@media(max-width:768px){.grid{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}.header-right{width:100%;justify-content:space-between}.tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}.tab-btn{padding:8px 10px;font-size:12px}.stats-row{grid-template-columns:repeat(2,1fr)}.calc-grid{grid-template-columns:1fr}.fav-panel{width:100%}}
</style>
</head>
<body>
<div class="container">
<div class="control-area">
<div class="header">
<div class="header-left">
<h1>支付营销监控</h1>
<span class="version">V6</span>
</div>
<div class="header-right">
<span class="update-time" id="updateTime"></span>
<span class="btn btn-icon" onclick="toggleFav()" title="我的收藏">⭐ <span id="favCount">0</span></span>
<span class="btn btn-icon" onclick="toggleTheme()" title="切换主题" id="themeBtn">🌙</span>
</div>
</div>
</div>
<div class="control-area">
<div class="search-box">
<span>🔍</span>
<input type="text" id="searchInput" placeholder="搜索银行/平台/优惠... (如:招行/京东)" oninput="handleSearch()">
</div>
<div class="quick-btns">
<button class="quick-btn" onclick="quickSearch('京东最划算的方案')">京东最划算</button>
<button class="quick-btn" onclick="quickSearch('哪个银行满减最多')">满减最多</button>
<button class="quick-btn" onclick="quickSearch('即将到期的优惠')">即将到期</button>
<button class="quick-btn" onclick="quickSearch('3C数码最佳组合')">3C最佳组合</button>
</div>
</div>
<div class="calendar-section">
<div class="calendar-title">📅 2026年营销日历 <span style="font-size:12px;color:var(--text3)">当前: <span id="currentDate"></span></span></div>
<div class="calendar-track">
<div class="calendar-line"></div>
<div class="calendar-progress" id="calendarProgress"></div>
<div class="calendar-now" id="calendarNow"></div>
<div id="calendarNodes"></div>
</div>
<div class="calendar-months" id="calendarMonths"></div>
</div>
<div class="tabs control-area">
<button class="tab-btn active" data-tab="platform" onclick="switchTab('platform')">按平台</button>
<button class="tab-btn" data-tab="bank" onclick="switchTab('bank')">按银行</button>
<button class="tab-btn" data-tab="category" onclick="switchTab('category')">按品类</button>
<button class="tab-btn" data-tab="compare" onclick="switchTab('compare')">横向对比</button>
<button class="tab-btn" data-tab="calc" onclick="switchTab('calc')">省钱计算</button>
<button class="tab-btn" data-tab="stack" onclick="switchTab('stack')">叠加模拟</button>
<button class="tab-btn" data-tab="data" onclick="switchTab('data')">📊数据管理</button>
<button class="tab-btn" data-tab="log" onclick="switchTab('log')">📡监控日志</button>
</div>
<div class="filter-section control-area">
<div class="filter-row">
<span class="label">平台:</span>
<div id="filterPlatform"></div>
</div>
<div class="filter-row">
<span class="label">支付:</span>
<div id="filterPayMethod"></div>
</div>
<div class="filter-row">
<span class="label">类型:</span>
<div id="filterType"></div>
</div>
<div class="filter-row">
<span class="label">状态:</span>
<div id="filterStatus"></div>
</div>
</div>
<div id="statsRow" class="stats-row"></div>
<div id="tabContent"></div>
</div>
<div class="overlay" id="overlay" onclick="closeFav()"></div>
<div class="fav-panel" id="favPanel">
<h3>⭐ 我的收藏 <span class="close" onclick="closeFav()">×</span></h3>
<div id="favList"></div>
</div>
<button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>
<script>
var _data={version:'',lastUpdated:'',offers:[],calendar:[],platforms:[],banks:[]};
var _filteredOffers=[];
var _filters={platform:'',payMethod:'',type:'',status:'active'};
var _favs=[];
var _theme='dark';
var _searchQuery='';
var _synonyms={'招行':['招商银行','CMD'],'工行':['工商银行','ICBC'],'建行':['建设银行'],'农行':['农业银行'],'中行':['中国银行'],'交行':['交通银行'],'浦发':['浦发银行'],'光大':['光大银行'],'兴业':['兴业银行'],'民生':['民生银行'],'华夏':['华夏银行'],'邮储':['邮储银行'],'中信':['中信银行'],'广发':['广发银行'],'江南农商':['江南农商行','江南农商银行']};
var _categoryMap={'3C数码':['3C数码','3C','数码','手机','电脑'],'家电':['家电','电器','空调','冰箱','洗衣机'],'黄金珠宝':['黄金','珠宝','金饰'],'美妆个护':['美妆','个护','护肤','彩妆'],'外卖食品':['外卖','食品','餐饮'],'出行旅游':['出行','旅游','机票','酒店']};
var _categoryTags=['3C数码','家电','黄金珠宝','美妆个护','外卖食品','出行旅游'];
var _platformKeys={};
var _typeLabels={reduce:'立减',installment:'分期',bind:'首绑',random:'随机减',points:'积分',cashback:'返现',subsidy:'贴息',freered:'免单',free:'免息',credit:'提额'};
var _today=new Date();
var _currentTab='platform';
function init(){
loadTheme();
loadFavs();

function loadTheme(){
_theme=localStorage.getItem('pay-theme')||'dark';
if(_theme==='light')document.body.classList.add('light');
document.getElementById('themeBtn').textContent=_theme==='dark'?'🌙':'☀️';
}
function toggleTheme(){
_theme=_theme==='dark'?'light':'dark';
localStorage.setItem('pay-theme',_theme);
document.body.classList.toggle('light');
document.getElementById('themeBtn').textContent=_theme==='dark'?'🌙':'☀️';
}
function loadFavs(){
try{_favs=JSON.parse(localStorage.getItem('pay-favs'))||[]}catch(e){_favs=[];}
document.getElementById('favCount').textContent=_favs.length;
}
function saveFavs(){
localStorage.setItem('pay-favs',JSON.stringify(_favs));
document.getElementById('favCount').textContent=_favs.length;
}
function toggleFav(id){
if(id){
var idx=_favs.indexOf(id);
if(idx>=0){_favs.splice(idx,1);return false;}
else{_favs.push(id);return true;}
}
document.getElementById('favPanel').classList.toggle('open');
document.getElementById('overlay').classList.toggle('show');
renderFavList();
}
function closeFav(){
document.getElementById('favPanel').classList.remove('open');
document.getElementById('overlay').classList.remove('show');
}
function renderFavList(){
var el=document.getElementById('favList');
if(_favs.length===0){el.innerHTML='<div class="fav-empty">暂无收藏</div>';return;}
var html='';
_favs.forEach(function(id){
var o=_data.offers.find(function(x){return x.id===id;});
if(o){
html+='<div class="fav-item"><div class="fav-title">'+o.bank+'·'+o.platform+'·'+o.typeLabel+'</div><div class="fav-desc">'+o.detail+' | '+o.amount+'</div><span class="fav-remove" onclick="removeFav(\''+id+'\')">删除</span></div>';
}
});
el.innerHTML=html;
}
function removeFav(id){
_favs=_favs.filter(function(f){return f!==id;});
saveFavs();
renderFavList();
renderCurrentTab();
}
async function loadData(){
try{
var res=await fetch('./data-v6.json');
_data=await res.json();
}catch(e){
console.warn('fetch失败，使用内嵌数据');
_data=getEmbeddedData();
}
localStorage.setItem('pay-v6-last-fetch',new Date().toISOString());
_data.platforms.forEach(function(p){_platformKeys[p.key]=p;});
_data.platforms.forEach(function(p){_platformKeys[p.name]=p;});
updateStats();
renderFilters();
renderCalendar();
renderCurrentTab();
document.getElementById('updateTime').textContent='数据更新: '+_data.lastUpdated;
}

function expandSynonyms(query){

result=result.concat(_synonyms[key]);
}
_synonyms[key].forEach(function(syn){
if(syn.toLowerCase().indexOf(q)>=0||q.indexOf(syn.toLowerCase())>=0){
result.push(key);
result=result.concat(_synonyms[key]);
}
});
}
return result;
}

var m=o.amount.match(/(\d+)/);
save=m?parseInt(m[1]):0;
}else if(o.type==='cashback'){
var m=o.amount.match(/(\d+)/);
save=m?Math.min(parseInt(m[1])*0.1,50):10;
}else if(o.type==='random'){
save=parseInt(o.amount.replace(/[^0-9]/g,''))||5;
}else if(o.type==='subsidy'){
var m=o.amount.match(/(\d+)/);
save=m?Math.min(parseInt(m[1])*0.05,200):50;
}
return{offer:o,save:save};
}).filter(function(c){return c.save>0;}).sort(function(a,b){return b.save-a.save;});
var result=document.getElementById('calcResult');
if(candidates.length===0){
result.classList.remove('show');
result.innerHTML='';
return;
}
var best=candidates[0];
var totalSave=Math.min(best.save,price*0.3);
result.classList.add('show');
result.innerHTML='<div class="calc-best"><h4>🏆 最优方案</h4><div class="combo">'+best.offer.bank+' · '+best.offer.platform+' · '+best.offer.typeLabel+'</div><div class="detail">'+best.offer.detail+'</div><div style="margin-top:8px;font-size:18px">预计节省: <strong style="color:var(--green)">'+totalSave.toFixed(0)+'元</strong></div></div>';
if(candidates.length>1){
var others='<div class="calc-others">';
candidates.slice(1,4).forEach(function(c,i){
others+='<div class="calc-other"><div class="rank">第'+(i+2)+'名</div><div class="combo-text">'+c.offer.bank+'·'+c.offer.platform+'·'+c.offer.typeLabel+'</div><div class="save">-'+c.save+'元</div><div class="detail">'+c.offer.detail+'</div></div>';
});
others+='</div>';
result.innerHTML+=others;
}
}
function renderStackTab(el){
el.innerHTML='<div class="calc-section"><h3>🔗 叠加模拟器</h3><div class="calc-grid"><div class="calc-field"><label>商品原价(元)</label><input type="number" id="stackPrice" placeholder="输入金额" value="5000"></div><div class="calc-field"><label>叠加优惠数量</label><select id="stackCount"><option value="1">1个</option><option value="2" selected>2个</option><option value="3">3个</option></select></div></div><button class="calc-btn" onclick="runStack()">模拟叠加</button><div id="stackResult"></div></div>';
}
function runStack(){
var price=parseFloat(document.getElementById('stackPrice').value)||0;
var count=parseInt(document.getElementById('stackCount').value)||1;
var stackable=_data.offers.filter(function(o){
if(o._status==='expired'||o._status==='upcoming')return false;
return['reduce','installment','subsidy'].indexOf(o.type)>=0||o.type==='cashback';
}).sort(function(a,b){
var sa=parseAmount(a.amount);var sb=parseAmount(b.amount);
return sb-sa;
}).slice(0,count);
if(stackable.length===0){
document.getElementById('stackResult').innerHTML='<div class="empty-state">暂无可叠加的优惠</div>';
return;
}
var flow='<div class="stack-flow">';
flow+='<div class="stack-step"><div class="icon">💰</div><div class="name">原价</div><div class="amount">'+price+'元</div></div>';
var totalSave=0;
stackable.forEach(function(o,i){
var save=Math.min(parseAmount(o.amount),price*0.2);
totalSave+=save;
flow+='<div class="stack-arrow">+</div><div class="stack-step"><div class="icon">💳</div><div class="name">'+o.bank+'·'+o.typeLabel+'</div><div class="amount">-'+save.toFixed(0)+'元</div></div>';
});
flow+='<div class="stack-arrow">=</div><div class="stack-step"><div class="icon">✅</div><div class="name">最终价</div><div class="amount" style="color:var(--green)">'+(price-totalSave).toFixed(0)+'元</div></div>';
flow+='</div>';
flow+='<div class="stack-result"><div class="label">叠加 '+count+' 个优惠后</div><div class="price">'+(price-totalSave).toFixed(0)+'元</div><div class="saved">共节省 '+totalSave.toFixed(0)+'元 (省'+(totalSave/price*100).toFixed(1)+'%)</div></div>';
document.getElementById('stackResult').innerHTML=flow;
}
function renderDataTab(el){
var active=0,expiring=0,expired=0;
_data.offers.forEach(function(o){
if(o._status==='active')active++;
else if(o._status==='expiring')expiring++;
else if(o._status==='expired')expired++;
});
var lastFetch=localStorage.getItem('pay-v6-last-fetch')||'未知';
var daysOld=lastFetch!=='未知'?Math.floor((_today-new Date(lastFetch))/(1000*60*60*24)):0;
var warning=daysOld>7?'<div class="data-warning">⚠️ 数据已超过'+daysOld+'天未更新，建议刷新获取最新数据</div>':'';
el.innerHTML='<div class="data-panel"><h3>📊 数据统计</h3><div class="data-stats"><div class="data-stat"><div class="value" style="color:var(--accent)">'+_data.offers.length+'</div><div class="label">总优惠</div></div><div class="data-stat"><div class="value" style="color:var(--green)">'+active+'</div><div class="label">进行中</div></div><div class="data-stat"><div class="value" style="color:var(--orange)">'+expiring+'</div><div class="label">即将到期</div></div><div class="data-stat"><div class="value" style="color:var(--red)">'+expired+'</div><div class="label">已过期</div></div></div>'+warning+'<h3>📥 导出/导入</h3><div class="data-actions"><button class="btn" onclick="exportData()">📤 导出JSON</button><button class="btn" onclick="document.getElementById(\'importFile\').click()">📥 导入JSON</button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)"></div><h3>🏷️ 手动标记</h3><div class="data-actions"><button class="btn" onclick="markAllActive()">全部标为进行中</button><button class="btn" onclick="markAllExpired()">全部标为已过期</button></div><div style="margin-top:12px;font-size:12px;color:var(--text3)">最后更新: '+lastFetch+'</div></div>';
}
function exportData(){
var blob=new Blob([JSON.stringify(_data,null,2)],{type:'application/json'});
var url=URL.createObjectURL(blob);
var a=document.createElement('a');
a.href=url;a.download='payment-offers-'+new Date().toISOString().slice(0,10)+'.json';
a.click();URL.revokeObjectURL(url);
}
function importData(input){
var file=input.files[0];
if(!file)return;
var reader=new FileReader();
reader.onload=function(e){
try{
var imported=JSON.parse(e.target.result);
if(imported.offers){
_data=imported;
localStorage.setItem('pay-v6-data-override',JSON.stringify(imported));
localStorage.setItem('pay-v6-last-fetch',new Date().toISOString());
calcOffersStatus();
updateStats();
renderFilters();
renderCurrentTab();
alert('导入成功，共'+imported.offers.length+'条优惠');
}else{
alert('无效的数据格式');
}
}catch(err){
alert('导入失败: '+err.message);
}
};
reader.readAsText(file);
}
function markAllActive(){
_data.offers.forEach(function(o){o._status='active';});
localStorage.setItem('pay-v6-data-override',JSON.stringify(_data));
updateStats();
renderCurrentTab();
}
function markAllExpired(){
_data.offers.forEach(function(o){o._status='expired';});
localStorage.setItem('pay-v6-data-override',JSON.stringify(_data));
updateStats();
renderCurrentTab();
}
function renderLogTab(el){
var logs=[];
var active=0,expiring=0,expired=0;
_data.offers.forEach(function(o){
if(o._status==='active')active++;
else if(o._status==='expiring')expiring++;
else if(o._status==='expired')expired++;
if(o._status==='active'){
logs.push({icon:'✅',title:o.bank+'·'+o.platform+'·'+o.typeLabel,title2:o.amount,desc:'进行中 | 有效期至'+o.endDate,time:'活跃'});
}
});
var expiringOffers=_data.offers.filter(function(o){return o._status==='expiring';});
if(expiringOffers.length>0){
var days=Math.min.apply(null,expiringOffers.map(function(o){return Math.ceil((new Date(o.endDate)-_today)/(1000*60*60*24));}));
logs.unshift({icon:'⏰',title:'⚠️ '+expiringOffers.length+'条优惠即将到期',desc:'最近 '+days+' 天内结束',time:new Date().toLocaleDateString()});
}
if(active>0){
logs.unshift({icon:'📊',title:'当前数据统计',desc:'进行中: '+active+'条 | 即将到期: '+expiring+'条 | 已过期: '+expired+'条',time:new Date().toLocaleDateString()});
}
if(logs.length===0){
el.innerHTML='<div class="log-empty">暂无监控日志</div>';
return;
}
var html='<div class="log-section">';
logs.forEach(function(log){
html+='<div class="log-item"><div class="log-icon">'+log.icon+'</div><div class="log-content"><div class="log-title">'+log.title+'</div><div class="log-desc">'+log.desc+'</div><div class="log-time">'+log.time+'</div></div></div>';
});
html+='</div>';
el.innerHTML=html;
}
function renderCalendar(){
document.getElementById('currentDate').textContent=_today.toLocaleDateString();
var year=_today.getFullYear();
var startOfYear=new Date(year,0,1);
var endOfYear=new Date(year,11,31);
var yearProgress=((_today-startOfYear)/(endOfYear-startOfYear))*100;
document.getElementById('calendarProgress').style.width=yearProgress+'%';
var nowPos=yearProgress;
document.getElementById('calendarNow').style.left='calc('+yearProgress+'% - 6px)';
var monthsHtml='';
for(var m=0;m<12;m++){
var monthPercent=((new Date(year,m,1)-startOfYear)/(endOfYear-startOfYear))*100;
monthsHtml+='<span style="position:absolute;left:'+monthPercent+'%">'+(m+1)+'月</span>';
}
document.getElementById('calendarMonths').innerHTML=monthsHtml;
var nodesHtml='';
_data.calendar.forEach(function(ev){
var evStart=new Date(ev.start);
var evEnd=new Date(ev.end);
var evMid=new Date((evStart.getTime()+evEnd.getTime())/2);
var evPercent=((evMid-startOfYear)/(endOfYear-startOfYear))*100;
var isPast=evEnd<_today;
var isCurrent=evStart<=_today&&evEnd>=_today;
var cls=isPast?'past':isCurrent?'current':'upcoming';
nodesHtml+='<div class="calendar-node '+cls+'" style="left:'+evPercent+'%"><div class="calendar-node-dot">'+ev.icon+'</div><div class="calendar-node-label">'+ev.name+'</div><div class="calendar-node-info"><div class="info-name">'+ev.name+'</div><div class="info-time">'+ev.start+' ~ '+ev.end+'</div><div class="info-desc">'+ev.desc+'</div></div></div>';
});
document.getElementById('calendarNodes').innerHTML=nodesHtml;
}
function scrollToTop(){
window.scrollTo({top:0,behavior:'smooth'});
}
window.addEventListener('scroll',function(){
document.getElementById('scrollTop').classList.toggle('show',window.scrollY>200);
});
init();
</script>
